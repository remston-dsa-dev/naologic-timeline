<div class="timeline-grid">
  <app-timeline-axis
    [columns]="columns"
    [colWidth]="colWidth"
  />
  <app-current-period-indicator [zoom]="zoom" />
  <div class="timeline-rows" [style.min-width.px]="totalWidth">
    @for (wc of workCenters; track wc.docId) {
      <app-timeline-row
        [workCenter]="wc"
        [orders]="getOrdersFor(wc.docId)"
        [range]="range"
        [totalWidth]="totalWidth"
        [zoom]="zoom"
        [colWidth]="colWidth"
      />
    }
  </div>
</div>
